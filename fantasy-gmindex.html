<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy GM — NBA War Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;--accent:#e8ff47;--accent2:#ff6b35;--text:#f0f0f0;--muted:#666;--win:#4ade80;--loss:#f87171;--battle:#fbbf24}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    .app{display:flex;height:100vh;overflow:hidden}
    .sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
    .logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
    .logo-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent);line-height:1}
    .logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
    .nav{flex:1;padding:16px 0;overflow-y:auto}
    .nav-btn{width:100%;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 20px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s;border-left:3px solid transparent}
    .nav-btn:hover{color:var(--text);background:var(--surface2)}
    .nav-btn.active{color:var(--accent);border-left-color:var(--accent);background:rgba(232,255,71,.05)}
    .nav-icon{font-size:16px;width:20px;text-align:center}
    .sidebar-footer{padding:16px 20px;border-top:1px solid var(--border)}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--win);display:inline-block}
    .dot.off{background:var(--loss)}
    .main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
    .topbar{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:10}
    .topbar-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
    .topbar-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
    .content{padding:24px 28px;flex:1}
    .setup-screen{max-width:580px;margin:32px auto;padding:0 16px}
    .setup-header{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:3px;color:var(--accent);line-height:1;margin-bottom:6px}
    .setup-sub{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.6}
    .setup-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-bottom:14px}
    .setup-card-title{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
    .setup-card-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--border);float:right;line-height:1}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
    input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s;margin-bottom:10px}
    input:focus,select:focus,textarea:focus{border-color:var(--accent)}
    input::placeholder,textarea::placeholder{color:var(--muted)}
    .hint{font-size:11px;color:var(--muted);margin-top:-6px;margin-bottom:10px;line-height:1.5}
    .btn{background:var(--accent);color:#000;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;padding:10px 20px;cursor:pointer;transition:all .15s;letter-spacing:.3px}
    .btn:hover{background:#d4e840}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-ghost:hover{border-color:var(--accent)}
    .btn-sm{font-size:12px;padding:7px 14px}
    .btn-full{width:100%}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:14px}
    .card-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:14px}

    /* STATS GRID */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:16px}
    .player-stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
    .player-stat-card.loading{opacity:.5}
    .psn{font-size:14px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:8px}
    .pst{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:10px}
    .stat-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .stat-chip{font-family:'DM Mono',monospace;font-size:11px;padding:3px 8px;border-radius:4px;background:var(--surface);border:1px solid var(--border)}
    .stat-chip span{color:var(--muted);margin-right:2px}
    .stat-chip strong{color:var(--text)}
    .games-badge{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(232,255,71,.1);color:var(--accent);border:1px solid rgba(232,255,71,.2)}
    .games-badge.low{background:rgba(248,113,113,.1);color:var(--loss);border-color:rgba(248,113,113,.2)}
    .status-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-family:'DM Mono',monospace}
    .status-badge.gtd{background:rgba(251,191,36,.1);color:var(--battle);border:1px solid rgba(251,191,36,.2)}
    .status-badge.out{background:rgba(248,113,113,.1);color:var(--loss);border:1px solid rgba(248,113,113,.2)}

    /* UPLOAD */
    .upload-zone{border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px;position:relative;overflow:hidden}
    .upload-zone:hover{border-color:var(--accent);background:rgba(232,255,71,.02)}
    .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-preview{display:flex;align-items:flex-start;gap:10px;padding:10px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);margin-bottom:10px}
    .upload-preview img{width:72px;height:50px;object-fit:cover;border-radius:4px;flex-shrink:0}
    .divider{display:flex;align-items:center;gap:8px;margin:8px 0}
    .divider-line{flex:1;height:1px;background:var(--border)}
    .divider-text{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}

    /* CHAT */
    .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 57px)}
    .chat-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
    .chat-input-wrap{padding:14px 24px;border-top:1px solid var(--border);background:var(--surface)}
    .chat-input-row{display:flex;gap:8px}
    .chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;outline:none;resize:none;min-height:44px;max-height:120px;margin-bottom:0;transition:border-color .15s}
    .chat-input:focus{border-color:var(--accent)}
    .msg{max-width:82%;display:flex;flex-direction:column;gap:3px}
    .msg.user{align-self:flex-end;align-items:flex-end}
    .msg.ai{align-self:flex-start;align-items:flex-start}
    .msg-bubble{padding:11px 15px;border-radius:12px;font-size:13px;line-height:1.7;white-space:pre-wrap}
    .msg.user .msg-bubble{background:var(--accent);color:#000;font-weight:500;border-bottom-right-radius:4px}
    .msg.ai .msg-bubble{background:var(--surface);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
    .msg-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
    .quick-prompts{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
    .quick-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;padding:5px 12px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
    .quick-btn:hover{border-color:var(--accent);color:var(--accent)}
    .typing-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);margin:0 2px;animation:blink 1.2s infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}
    .typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
    .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
    .empty-state .big{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--border)}
    .empty-state p{font-size:13px;margin-top:8px;line-height:1.6}
    .info-box{background:rgba(232,255,71,.04);border:1px solid rgba(232,255,71,.15);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--muted);line-height:1.6}
    .info-box strong{color:var(--accent)}
    .warn-box{background:rgba(255,107,53,.04);border:1px solid rgba(255,107,53,.2);border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--muted);line-height:1.6}
    .warn-box strong{color:var(--accent2)}
    .section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:20px}
    .section-label:first-child{margin-top:0}
    .punt-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;background:var(--surface2);color:var(--muted)}
    .punt-btn.active{border-color:var(--accent);background:rgba(232,255,71,.1);color:var(--accent)}
    @media(max-width:768px){.sidebar{width:56px;min-width:56px}.logo-title,.logo-sub,.nav-btn span{display:none}.nav-btn{justify-content:center;padding:12px}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const CATS=["PTS","REB","AST","STL","BLK","3PM","FG%","FT%","TO"];
const NAV=[
  {id:"brief",    icon:"☀️",label:"Daily Brief"},
  {id:"matchup",  icon:"⚔️",label:"Matchup"},
  {id:"waiver",   icon:"➕",label:"Waiver Wire"},
  {id:"trades",   icon:"🔄",label:"Trade Ideas"},
  {id:"chat",     icon:"💬",label:"GM Chat"},
  {id:"settings", icon:"⚙️",label:"Settings"},
];
const SEASON=2024; // current NBA season key for BallDontLie

function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function lv(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}

// ── API HELPERS ───────────────────────────────────────────────────────────────
async function bdlSearchPlayer(name, bdlKey) {
  const r = await fetch(`https://api.balldontlie.io/v1/players?search=${encodeURIComponent(name)}&per_page=5`,
    {headers:{Authorization: bdlKey}});
  const d = await r.json();
  return d.data?.[0] || null;
}

async function bdlSeasonAvg(playerId, bdlKey) {
  const r = await fetch(`https://api.balldontlie.io/v1/season_averages?season=${SEASON}&player_ids[]=${playerId}`,
    {headers:{Authorization: bdlKey}});
  const d = await r.json();
  return d.data?.[0] || null;
}

async function bdlRecentGames(playerId, bdlKey) {
  // Last 14 days of games
  const since = new Date(Date.now() - 14*24*60*60*1000).toISOString().split('T')[0];
  const r = await fetch(`https://api.balldontlie.io/v1/stats?player_ids[]=${playerId}&start_date=${since}&per_page=15`,
    {headers:{Authorization: bdlKey}});
  const d = await r.json();
  return d.data || [];
}

async function bdlUpcomingGames(teamId, bdlKey) {
  const today = new Date().toISOString().split('T')[0];
  const weekEnd = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
  const r = await fetch(`https://api.balldontlie.io/v1/games?team_ids[]=${teamId}&start_date=${today}&end_date=${weekEnd}&per_page=10`,
    {headers:{Authorization: bdlKey}});
  const d = await r.json();
  return d.data || [];
}

function calcL14Avg(games) {
  if(!games.length) return null;
  const avg = f => (games.reduce((s,g)=>s+(g[f]||0),0)/games.length).toFixed(1);
  const fgm = games.reduce((s,g)=>s+(g.fgm||0),0);
  const fga = games.reduce((s,g)=>s+(g.fga||0),0);
  const ftm = games.reduce((s,g)=>s+(g.ftm||0),0);
  const fta = games.reduce((s,g)=>s+(g.fta||0),0);
  return {
    pts:avg('pts'), reb:avg('reb'), ast:avg('ast'),
    stl:avg('stl'), blk:avg('blk'), fg3m:avg('fg3m'),
    fg_pct: fga>0?(fgm/fga*100).toFixed(1):'—',
    ft_pct: fta>0?(ftm/fta*100).toFixed(1):'—',
    to:avg('turnover'), gp:games.length
  };
}

async function fetchPlayerData(name, bdlKey) {
  try {
    const player = await bdlSearchPlayer(name, bdlKey);
    if(!player) return {name, error:'Not found'};
    const [season, recent, upcoming] = await Promise.all([
      bdlSeasonAvg(player.id, bdlKey),
      bdlRecentGames(player.id, bdlKey),
      bdlUpcomingGames(player.team_id, bdlKey)
    ]);
    const l14 = calcL14Avg(recent);
    return {
      name, playerId:player.id, team:player.team?.abbreviation,
      pos:player.position, season, l14,
      gamesLeft: upcoming.length,
      upcomingGames: upcoming.map(g=>{
        const isHome = g.home_team_id===player.team_id;
        return (isHome?'vs ':'@ ')+(isHome?g.visitor_team?.abbreviation:g.home_team?.abbreviation);
      })
    };
  } catch(e) {
    return {name, error:e.message};
  }
}

async function fetchAllPlayers(names, bdlKey) {
  const list = names.split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
  return Promise.all(list.map(n=>fetchPlayerData(n, bdlKey)));
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function callClaude(apiKey, messages, system) {
  const res = await fetch("https://green-firefly-f124.amirgelman.workers.dev/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-beta":"web-search-2025-03-05"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system,
      tools:[{type:"web_search_20250305",name:"web_search"}],messages})
  });
  const data=await res.json();
  if(!res.ok) throw new Error(data.error?.message||"API error");
  return data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

async function compressImage(dataUrl,maxWidth=1200){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxWidth/img.width);
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      resolve(canvas.toDataURL('image/jpeg',0.82));
    };
    img.src=dataUrl;
  });
}

async function readImageWithClaude(apiKey,base64,mediaType,prompt){
  const res=await fetch("https://green-firefly-f124.amirgelman.workers.dev/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:base64}},
        {type:"text",text:prompt}
      ]}]})
  });
  const data=await res.json();
  if(!res.ok){
    const msg=data.error?.message||JSON.stringify(data);
    throw new Error(msg);
  }
  return data.content[0]?.text||"";
}

function buildSystem(s, rosterData, oppData, waiverData) {
  const fmtPlayer = p => {
    if(!p||p.error) return `${p?.name||'?'} (data unavailable)`;
    const sa = p.season;
    const l = p.l14;
    return `${p.name} (${p.team||'?'}, ${p.pos||'?'}) | Games left this week: ${p.gamesLeft} (${p.upcomingGames?.join(', ')||'none'}) | Season avg: ${sa?`${sa.pts}pts ${sa.reb}reb ${sa.ast}ast ${sa.stl}stl ${sa.blk}blk ${sa.fg3m}3pm ${sa.fg_pct}fg% ${sa.ft_pct}ft% ${sa.turnover||'?'}to`:'N/A'} | L14 avg: ${l?`${l.pts}pts ${l.reb}reb ${l.ast}ast ${l.stl}stl ${l.blk}blk ${l.fg3m}3pm ${l.fg_pct}fg% ${l.ft_pct}ft% ${l.to}to (${l.gp} games)`:'N/A'}`;
  };

  const myRosterStr = rosterData?.length ? rosterData.map(fmtPlayer).join('\n') : s.roster||'not provided';
  const oppStr = oppData?.length ? oppData.map(fmtPlayer).join('\n') : [s.opponent,s.oppRoster].filter(Boolean).join(', ')||'not provided';
  const waiverStr = waiverData?.length ? waiverData.map(fmtPlayer).join('\n') : s.waiver||'not provided';

  return `You are an elite NBA fantasy basketball GM advisor. Direct, analytical, data-driven.

H2H 9-CAT LEAGUE | Team: ${s.teamName||'not set'} | Punt: ${s.punt?.join(' + ')||'not set'}

WINNING FORMULA: Top 3 in 6+ cats → most consistent winners. Top 5 in 7 cats. Punt 1-2 cats completely. Never half-punt.

MY ROSTER (with real stats from BallDontLie API + games left this week):
${myRosterStr}

OPPONENT THIS WEEK:
${oppStr}

AVAILABLE WAIVER PLAYERS (with real stats):
${waiverStr}

RULES:
- ALWAYS web search for this week's NBA schedule to get accurate games remaining per team
- Search "[player name] injury news 2026" before any recommendation
- Project week totals as: L14 avg × actual games remaining this week (from schedule search)
- Keep all responses SHORT — bullet points, no walls of text
- Only recommend drops if player is genuinely replaceable
- Trade ideas must show explicit category rank impact`;
}

// ── MULTI SCREENSHOT UPLOAD ───────────────────────────────────────────────────
function MultiScreenshotUpload({label,hint,prompt,value,apiKey,onChange}){
  const [images,setImages]=useState([]);
  const [reading,setReading]=useState(false);
  const [error,setError]=useState("");

  async function handleFiles(files){
    if(!apiKey){setError("Enter your Anthropic API key first.");return;}
    setError("");
    setReading(true);
    const allNames=[];
    for(const file of Array.from(files)){
      if(!file.type.startsWith("image/")) continue;
      try{
        const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});
        const compressed=await compressImage(dataUrl,1200);
        const base64=compressed.split(",")[1];
        const result=await readImageWithClaude(apiKey,base64,"image/jpeg",prompt);
        allNames.push(result.trim());
        setImages(prev=>[...prev,{url:dataUrl,name:file.name}]);
      }catch(err){setError("Error reading "+file.name+": "+err.message);}
    }
    const combined=[value,...allNames].filter(Boolean).join(", ");
    onChange(combined);
    setReading(false);
  }

  return(
    <div style={{marginBottom:14}}>
      <label style={{marginBottom:6,display:"block",fontWeight:600,fontSize:13}}>{label}</label>
      {hint&&<p className="hint" style={{marginTop:0,marginBottom:8}}>{hint}</p>}
      {images.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
          {images.map((img,i)=>(
            <div key={i} style={{position:"relative",width:80,height:60,borderRadius:6,overflow:"hidden",border:"1px solid var(--border)"}}>
              <img src={img.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.7)",fontSize:8,padding:"2px 4px",color:"var(--muted)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{img.name}</div>
            </div>
          ))}
        </div>
      )}
      <div className="upload-zone" style={{position:"relative"}}>
        <input type="file" accept="image/*" multiple onChange={e=>handleFiles(e.target.files)} style={{position:"absolute",inset:0,opacity:0,cursor:"pointer"}}/>
        <div style={{fontSize:22,marginBottom:6}}>📸</div>
        {reading
          ?<div style={{fontSize:12,color:"var(--muted)",display:"flex",alignItems:"center",gap:6}}><span className="spinner" style={{width:11,height:11,borderWidth:2}}/> Reading screenshots...</div>
          :<div style={{fontSize:12,color:"var(--muted)"}}><strong style={{color:"var(--accent)"}}>Click or drag</strong> · add multiple screenshots</div>
        }
        {images.length>0&&!reading&&<div style={{fontSize:11,color:"var(--win)",marginTop:4}}>✅ {images.length} screenshot{images.length>1?"s":""} loaded</div>}
      </div>

// ── SCREENSHOT UPLOAD ─────────────────────────────────────────────────────────
function ScreenshotUpload({label,hint,prompt,value,apiKey,onChange}){
  const [preview,setPreview]=useState(null);
  const [reading,setReading]=useState(false);
  const [error,setError]=useState("");

  async function handleFile(file){
    if(!file||!file.type.startsWith("image/")){setError("Please upload an image file (PNG, JPG, etc).");return;}
    if(!apiKey){setError("Enter your Anthropic API key first (step 01 in setup).");return;}
    setError("");
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const rawDataUrl=e.target.result;
      setPreview({url:rawDataUrl,name:file.name});
      setReading(true);
      try{
        // Compress image to reduce size and ensure JPEG format
        const compressed=await compressImage(rawDataUrl,1200);
        const base64=compressed.split(",")[1];
        const result=await readImageWithClaude(apiKey,base64,"image/jpeg",prompt);
        onChange(result);
      }catch(err){
        console.error("Screenshot read error:",err);
        setError("Error: "+err.message+". Check your API key is correct and try again.");
      }
      setReading(false);
    };
    reader.onerror=()=>setError("Failed to read the file. Try a different image.");
    reader.readAsDataURL(file);
  }

  return(
    <div style={{marginBottom:14}}>
      <label style={{marginBottom:6,display:"block",fontWeight:600,fontSize:13}}>{label}</label>
      {hint&&<p className="hint" style={{marginTop:0,marginBottom:8}}>{hint}</p>}
      {preview?(
        <div className="upload-preview">
          <img src={preview.url} alt="ss"/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,color:"var(--muted)",fontFamily:"'DM Mono',monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:4}}>{preview.name}</div>
            {reading
              ?<div style={{fontSize:11,color:"var(--muted)",display:"flex",alignItems:"center",gap:6}}><span className="spinner" style={{width:11,height:11,borderWidth:2}}/> Reading...</div>
              :value?<div style={{fontSize:11,color:"var(--win)"}}>✅ Extracted</div>:null}
          </div>
          <button className="btn-ghost btn btn-sm" onClick={()=>{setPreview(null);onChange("");}}>✕</button>
        </div>
      ):(
        <div className="upload-zone">
          <input type="file" accept="image/*" onChange={e=>handleFile(e.target.files[0])}/>
          <div style={{fontSize:22,marginBottom:6}}>📸</div>
          <div style={{fontSize:12,color:"var(--muted)"}}><strong style={{color:"var(--accent)"}}>Click or drag</strong> a Yahoo screenshot</div>
        </div>
      )}
      {error&&<div style={{fontSize:11,color:"var(--loss)",marginTop:4}}>{error}</div>}
      <div className="divider"><div className="divider-line"/><span className="divider-text">or type manually</span><div className="divider-line"/></div>
      <textarea rows={2} placeholder="Paste player names..." value={value} onChange={e=>onChange(e.target.value)}/>
    </div>
  );
}

function Chat({settings,rosterData,oppData,waiverData}){
  const [messages,setMessages]=useState(lv("chat_msgs",[]));
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef();
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"})},[messages]);

  const QUICK=["Should I punt FT% or TO?","Analyze my category strengths and weaknesses","Who's my most tradeable player and why?","Which waiver player fits my punt best?","How do I win more categories this week?"];

  async function send(text){
    const msg=text||input.trim();
    if(!msg) return;
    setInput("");
    const newMsgs=[...messages,{role:"user",content:msg}];
    setMessages(newMsgs);sv("chat_msgs",newMsgs);
    setLoading(true);
    try{
      const sys=buildSystem(settings,rosterData,oppData,waiverData);
      const reply=await callClaude(settings.apiKey,newMsgs.map(m=>({role:m.role,content:m.content})),sys);
      const final=[...newMsgs,{role:"assistant",content:reply}];
      setMessages(final);sv("chat_msgs",final);
    }catch(e){
      setMessages(m=>[...m,{role:"assistant",content:"Error: "+e.message}]);
    }
    setLoading(false);
  }

  function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}

  return(
    <div className="chat-wrap">
      <div className="chat-messages">
        {messages.length===0&&<div style={{textAlign:"center",paddingTop:40}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:52,color:"var(--border)"}}>GM CHAT</div><div style={{color:"var(--muted)",fontSize:12,marginTop:8}}>Ask anything about your team, trades, or strategy.<br/>All responses use your real stats.</div></div>}
        {messages.map((m,i)=>(
          <div key={i} className={`msg ${m.role==="user"?"user":"ai"}`}>
            <div className="msg-label">{m.role==="user"?"YOU":"GM AI"}</div>
            <div className="msg-bubble">{m.content}</div>
          </div>
        ))}
        {loading&&<div className="msg ai"><div className="msg-label">GM AI</div><div className="msg-bubble"><div className="typing-dots"><span/><span/><span/></div></div></div>}
        <div ref={bottomRef}/>
      </div>
      <div className="chat-input-wrap">
        {messages.length===0&&<div className="quick-prompts">{QUICK.map(q=><button key={q} className="quick-btn" onClick={()=>send(q)}>{q}</button>)}</div>}
        <div className="chat-input-row">
          <textarea className="chat-input" rows={1} placeholder="Ask your GM anything..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}/>
          <button className="btn" onClick={()=>send()} disabled={loading||!input.trim()}>SEND</button>
        </div>
        {messages.length>0&&<button className="btn-ghost btn btn-sm" style={{marginTop:8}} onClick={()=>{setMessages([]);sv("chat_msgs",[]);}}>Clear chat</button>}
      </div>
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function Settings({settings,onSave}){
  const [form,setForm]=useState(settings);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const togglePunt=cat=>setForm(f=>{
    const p=f.punt.includes(cat)?f.punt.filter(c=>c!==cat):f.punt.length<2?[...f.punt,cat]:f.punt;
    return{...f,punt:p};
  });

  return(
    <div style={{maxWidth:560}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:2,marginBottom:16}}>SETTINGS</div>
      <div className="card">
        <div className="setup-card-title">API Keys</div>
        <label>Anthropic Key</label><input type="password" value={form.apiKey} onChange={e=>set("apiKey",e.target.value)}/>
        <label>BallDontLie Key</label><input type="password" value={form.bdlKey} onChange={e=>set("bdlKey",e.target.value)}/>
        <label>Team Name</label><input value={form.teamName} onChange={e=>set("teamName",e.target.value)}/>
      </div>
      <div className="card">
        <div className="setup-card-title">Punt Strategy</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:8}}>
          {CATS.map(c=><button key={c} className={`punt-btn ${form.punt.includes(c)?'active':''}`} onClick={()=>togglePunt(c)}>{c}</button>)}
        </div>
      </div>
      <div className="card">
        <div className="setup-card-title">Update Screenshots</div>
        <ScreenshotUpload label="My Roster" hint="Re-upload after any roster changes" prompt="List all player names on this Yahoo Fantasy Basketball roster as a comma-separated list only." value={form.roster} apiKey={form.apiKey} onChange={v=>set("roster",v)}/>
        <ScreenshotUpload label="Matchup Page" hint="Update each week" prompt="This is a Yahoo Fantasy Basketball matchup. MY TEAM: [comma-separated players] | OPPONENT: [comma-separated players]" value={form.opponent} apiKey={form.apiKey} onChange={v=>set("opponent",v)}/>
        <ScreenshotUpload label="Opponent's Roster (optional)" hint="Screenshot their full team page" prompt="This is a Yahoo Fantasy Basketball team roster. List all player names as a comma-separated list only." value={form.oppRoster} apiKey={form.apiKey} onChange={v=>set("oppRoster",v)}/>
        <ScreenshotUpload label="Waiver Wire" hint="Upload fresh each morning" prompt="List all available player names on this Yahoo Fantasy Basketball waiver wire as: Player Name (TEAM), ..." value={form.waiver} apiKey={form.apiKey} onChange={v=>set("waiver",v)}/>
      </div>
      <button className="btn" onClick={()=>onSave(form)}>SAVE</button>
      <button className="btn-ghost btn" style={{marginLeft:8}} onClick={()=>{if(confirm("Reset?")){localStorage.clear();window.location.reload();}}}>Reset App</button>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [settings,setSettings]=useState(lv("settings",null));
  const [tab,setTab]=useState("brief");
  const [rosterData,setRosterData]=useState([]);
  const [oppData,setOppData]=useState([]);
  const [waiverData,setWaiverData]=useState([]);
  const [loadingStats,setLoadingStats]=useState(false);

  function extractNames(text, prefix){
    if(!text) return "";
    if(prefix){
      const match=text.match(new RegExp(prefix+':\\s*([^|]+)','i'));
      return match?match[1].trim():text;
    }
    return text;
  }

  async function loadAllStats(s){
    if(!s?.bdlKey) return;
    setLoadingStats(true);
    try{
      const myNames=extractNames(s.roster);
      // Merge matchup page opponent names + direct opponent roster screenshot
      const oppFromMatchup=extractNames(s.opponent,"OPPONENT");
      const oppFromRoster=s.oppRoster||"";
      const oppNames=[oppFromMatchup,oppFromRoster].filter(Boolean).join(", ");
      const waiverNames=extractNames(s.waiver);
      const [my,opp,waiver]=await Promise.all([
        myNames?fetchAllPlayers(myNames,s.bdlKey):Promise.resolve([]),
        oppNames?fetchAllPlayers(oppNames,s.bdlKey):Promise.resolve([]),
        waiverNames?fetchAllPlayers(waiverNames,s.bdlKey):Promise.resolve([]),
      ]);
      setRosterData(my);
      setOppData(opp);
      setWaiverData(waiver);
    }catch(e){console.error(e);}
    setLoadingStats(false);
  }

  function handleSave(s){sv("settings",s);setSettings(s);loadAllStats(s);}

  useEffect(()=>{if(settings) loadAllStats(settings);},[]);

  if(!settings) return(
    <div style={{minHeight:"100vh",background:"var(--bg)",overflowY:"auto"}}>
      <SetupScreen onSave={handleSave}/>
    </div>
  );

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="logo">
          <div className="logo-title">FANTASY<br/>GM</div>
          <div className="logo-sub">War Room</div>
        </div>
        <nav className="nav">
          {NAV.map(n=>(
            <button key={n.id} className={`nav-btn ${tab===n.id?"active":""}`} onClick={()=>setTab(n.id)}>
              <span className="nav-icon">{n.icon}</span><span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted)",display:"flex",alignItems:"center",gap:6}}>
            <span className={`dot ${settings.apiKey&&settings.bdlKey?"":"off"}`}/>
            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{settings.teamName||"War Room"}</span>
          </div>
          {settings.punt?.length>0&&<div style={{fontSize:10,color:"var(--muted)",fontFamily:"'DM Mono',monospace",marginTop:4}}>PUNT: {settings.punt.join(" + ")}</div>}
          {loadingStats&&<div style={{fontSize:10,color:"var(--battle)",fontFamily:"'DM Mono',monospace",marginTop:4}}>⏳ Loading stats...</div>}
        </div>
      </aside>
      <main className="main">
        {tab!=="chat"&&(
          <div className="topbar">
            <div className="topbar-title">{NAV.find(n=>n.id===tab)?.label}</div>
            <div className="topbar-sub">H2H 9-Cat {settings.punt?.length?`· Punt ${settings.punt.join('+')}`:''}</div>
          </div>
        )}
        {tab==="brief"   &&<div className="content"><DailyBrief settings={settings} rosterData={rosterData} oppData={oppData} waiverData={waiverData} loadingStats={loadingStats}/></div>}
        {tab==="matchup" &&<div className="content"><MatchupView settings={settings} rosterData={rosterData} oppData={oppData} loadingStats={loadingStats}/></div>}
        {tab==="waiver"  &&<div className="content"><WaiverWire settings={settings} waiverData={waiverData} loadingStats={loadingStats} rosterData={rosterData} oppData={oppData}/></div>}
        {tab==="trades"  &&<div className="content"><TradeIdeas settings={settings} rosterData={rosterData}/></div>}
        {tab==="chat"    &&<Chat settings={settings} rosterData={rosterData} oppData={oppData} waiverData={waiverData}/>}
        {tab==="settings"&&<div className="content"><Settings settings={settings} onSave={handleSave}/></div>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
